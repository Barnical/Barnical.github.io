<style>
  .button-container {
    display: flex;
    flex-wrap: wrap; /* Allow wrapping to the next line */
    align-items: flex-start; /* Align items to the start vertically */
  }

  .button-container button {
    flex-basis: calc(33.33% - 10px); /* 33.33% width for each button with margin */
    margin: 5px; /* Adjust margin as needed */
  }
</style>

<div class="button-container">
  <button data-action="action1">Bitlife</button>
  <button data-action="action2">1v1.lol</button>
  <button data-action="action3">Among us</button>
  <button data-action="action4">atr3</button>
  <button data-action="action5">slope</button>
  <!-- Add more buttons as needed -->
</div>

<script>
  function openDictionary(dictionaryURL) {
    const dictionaryURL = dictionaryURL;
    window.location.href = dictionaryURL;
  }

  const buttons = document.querySelectorAll(".button-container button");

  buttons.forEach(button => {
    button.addEventListener("click", function() {
      const action = button.dataset.action;

      switch (action) {
        case "action1":
          openDictionary('/Games/Bitlife/index.html');
          break;
        case "action2":
          openDictionary('/Games/1v1.lol/index.html');
          break;
        case "action3":
          openDictionary('/Games/Amongus/index.html');
          break;
        case "action4":
          openDictionary('/Games/atr3/index.html');
          break;
        case "action5":
          openDictionary('/Games/slope/index.html');
          break;
        default:
          break;
      }
    });
  });
</script>
