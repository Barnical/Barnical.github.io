    <!-- Mr. Jailbreak time -->
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .button-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .button-container button {
    flex-basis: calc(20% - 10px);
    margin: 5px;
  }

  .embed-container {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    justify-content: center;
    align-items: center;
  }

  .embed-content {
    width: 80%;
    max-width: 800px;
    height: 80%;
    max-height: 600px;
    background-color: #fff;
    padding: 20px;
    position: relative;
  }

  .close-button {
    position: absolute;
    top: 10px;
    right: 10px;
    cursor: pointer;
  }
</style>

<div class="button-container">
  <button data-action="action1">Bitlife</button>
  <button data-action="action2">1v1.lol</button>
  <button data-action="action3">Among us</button>
  <button data-action="action4">atr3</button>
  <button data-action="action5">slope</button>
  <button data-action="snake">Snake</button>
  <!-- Add more buttons as needed -->
</div>

<div class="embed-container" id="snake-embed">
  <div class="embed-content">
    <iframe src="https://www.google.com/fbx?fbx=snake_arcade" width="100%" height="100%" frameborder="0"></iframe>
    <div class="close-button" onclick="closeEmbed()">X</div>
  </div>
</div>

<script>
  function openDictionary(dictionaryURL) {
    const dictionaryURL = dictionaryURL;
    window.location.href = dictionaryURL;
  }

  function openEmbed() {
    document.getElementById("snake-embed").style.display = "flex";
  }

  function closeEmbed() {
    document.getElementById("snake-embed").style.display = "none";
  }

  const buttons = document.querySelectorAll(".button-container button");

  buttons.forEach(button => {
    button.addEventListener("click", function() {
      const action = button.dataset.action;

      switch (action) {
        case "action1":
          openDictionary('/Games/Bitlife/index.html');
          break;
        case "action2":
          openDictionary('/Games/1v1.lol/index.html');
          break;
        case "action3":
          openDictionary('/Games/Amongus/index.html');
          break;
        case "action4":
          openDictionary('/Games/atr3/index.html');
          break;
        case "action5":
          openDictionary('/Games/slope/index.html');
          break;
        case "snake":
          openEmbed();
          break;
        default:
          break;
      }
    });
  });
</script>
