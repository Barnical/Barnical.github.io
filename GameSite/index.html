  .button-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* Adjust the number of columns as needed */
    gap: 10px; /* Adjust the space between buttons as needed */
  }

  .button-container button {
    padding: 10px;
  }
</style>

<div class="button-container">
  <button data-action="action1">Bitlife</button>
  <button data-action="action2">Button 2</button>
  <button data-action="action3">Button 3</button>
  <!-- Add more buttons as needed -->
</div>

<script>
  function openDictionary() {
    // Specify the path to your 'index.html' file
    const dictionaryURL = '/Games/Bitlife/index.html';

    // Redirect to the URL in the same tab
    window.location.href = dictionaryURL;
  }

  const buttons = document.querySelectorAll(".button-container button");

  buttons.forEach(button => {
    button.addEventListener("click", function() {
      const action = button.dataset.action;

      // Perform different actions based on the data-action attribute
      switch (action) {
        case "action1":
          openDictionary();
          break;
        case "action2":
          alert("Action 2 executed!");
          // Add more logic for action 2
          break;
        case "action3":
          alert("Action 3 executed!");
          // Add more logic for action 3
          break;
        // Add more cases for additional actions

        default:
          // Default action if no matching case is found
          break;
      }
    });
  });
</script>
